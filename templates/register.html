<!-- templates/register.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Montha AI</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body class="bg-light">

    <div class="container">

        <div class="row justify-content-center mt-5">

            <div class="col-md-7">

                <div class="card shadow-lg p-4">

                    <h2 class="text-center mb-4">
                        User Registration
                    </h2>

                    <form action="/register" method="POST">

                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input
                                type="text"
                                name="name"
                                class="form-control"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input
                                type="email"
                                name="email"
                                class="form-control"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mobile</label>
                            <input
                                type="text"
                                name="mobile"
                                class="form-control"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Role</label>
                            <select
                                name="role"
                                class="form-select"
                            >
                                <option value="user">User</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>

                        <div class="d-grid">
                            <button
                                type="submit"
                                class="btn btn-primary btn-lg"
                            >
                                Register
                            </button>
                        </div>

                    </form>

                    <div class="text-center mt-4">
                        <a href="/login-form">
                            Already have an account? Login
                        </a>
                    </div>

                </div>

            </div>

        </div>

    </div>

</body>
</html>

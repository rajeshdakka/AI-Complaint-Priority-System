<!-- templates/admin_dashboard.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Montha AI</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

    <div class="container mt-5">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h1 class="fw-bold">
                Admin Analytics Dashboard
            </h1>

            <a
                href="/reports"
                class="btn btn-dark"
            >
                Back to Reports
            </a>

        </div>

        <!-- Summary Cards -->
        <div class="row mb-4">

            <div class="col-md-4">
                <div class="card shadow-sm p-3 text-center">
                    <h4>Total Reports</h4>
                    <h2>{{ total_reports }}</h2>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm p-3 text-center">
                    <h4>Pending Reports</h4>
                    <h2>{{ pending_reports }}</h2>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm p-3 text-center">
                    <h4>High Priority</h4>
                    <h2>{{ high_priority }}</h2>
                </div>
            </div>

        </div>

        <!-- Charts -->
        <div class="row">

            <div class="col-md-6">
                <div class="card shadow-sm p-4">
                    <h4>Status Distribution</h4>
                    <canvas id="statusChart"></canvas>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card shadow-sm p-4">
                    <h4>Priority Distribution</h4>
                    <canvas id="priorityChart"></canvas>
                </div>
            </div>

        </div>

    </div>

   <script>
    const pendingReports = Number("{{ pending_reports }}");
    const inProgressReports = Number("{{ in_progress_reports }}");
    const resolvedReports = Number("{{ resolved_reports }}");

    const highPriority = Number("{{ high_priority }}");
    const mediumPriority = Number("{{ medium_priority }}");
    const lowPriority = Number("{{ low_priority }}");

    // Status Chart
    new Chart(
        document.getElementById("statusChart"),
        {
            type: "pie",
            data: {
                labels: ["Pending", "In Progress", "Resolved"],
                datasets: [{
                    data: [
                        pendingReports,
                        inProgressReports,
                        resolvedReports
                    ]
                }]
            }
        }
    );

    // Priority Chart
    new Chart(
        document.getElementById("priorityChart"),
        {
            type: "bar",
            data: {
                labels: ["High", "Medium", "Low"],
                datasets: [{
                    label: "Priority Count",
                    data: [
                        highPriority,
                        mediumPriority,
                        lowPriority
                    ]
                }]
            }
        }
    );
</script>
</body>
</html>

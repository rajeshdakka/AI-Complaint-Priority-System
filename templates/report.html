<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Complaint - Montha AI</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body class="bg-light">

    <div class="container">

        <div class="row justify-content-center mt-5">

            <div class="col-md-8">

                <div class="card shadow-lg p-4">

                    <h2 class="text-center mb-4">
                        Submit Complaint
                    </h2>

                    <!-- IMPORTANT: enctype added -->
                    <form
                        action="/report"
                        method="POST"
                        enctype="multipart/form-data"
                    >

                        <div class="mb-3">
                            <label class="form-label">
                                Name
                            </label>

                            <input
                                type="text"
                                name="name"
                                class="form-control"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Issue Description
                            </label>

                            <textarea
                                name="issue"
                                rows="5"
                                class="form-control"
                                required
                            ></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Location
                            </label>

                            <input
                                type="text"
                                name="location"
                                class="form-control"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Mobile
                            </label>

                            <input
                                type="text"
                                name="mobile"
                                class="form-control"
                                required
                            >
                        </div>

                        <!-- New File Upload -->
                        <div class="mb-3">
                            <label class="form-label">
                                Upload Proof Image / Document
                            </label>

                            <input
                                type="file"
                                name="proof_file"
                                class="form-control"
                            >
                        </div>

                        <div class="d-grid">
                            <button
                                type="submit"
                                class="btn btn-primary btn-lg"
                            >
                                Submit Report
                            </button>
                        </div>

                    </form>

                    <div class="text-center mt-4">

                        <a
                            href="/reports"
                            class="btn btn-outline-dark me-2"
                        >
                            View Reports
                        </a>

                        <a
                            href="/logout"
                            class="btn btn-dark"
                        >
                            Logout
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>
</html>
